<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- 파비콘 = PWA/앱 아이콘과 동일한 브랜드 마크(금색 FC-하트)로 통일 -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FANCLUV</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0e0e0e" />
    <meta name="description" content="K리그1 팬 커뮤니티 — 의견·설문·경기·랭킹·AI 인사이트" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://fancluv-site.vercel.app/" />

    <!-- OpenGraph / Twitter (링크 공유 미리보기) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FANCLUV" />
    <meta property="og:title" content="FANCLUV — K리그1 팬 커뮤니티" />
    <meta property="og:description" content="의견·설문·경기·랭킹·AI 인사이트를 한 곳에서. K리그1 팬 커뮤니티 FANCLUV." />
    <meta property="og:url" content="https://fancluv-site.vercel.app/" />
    <meta property="og:image" content="https://fancluv-site.vercel.app/icon-512.png" />
    <meta property="og:locale" content="ko_KR" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="FANCLUV — K리그1 팬 커뮤니티" />
    <meta name="twitter:description" content="의견·설문·경기·랭킹·AI 인사이트를 한 곳에서." />
    <meta name="twitter:image" content="https://fancluv-site.vercel.app/icon-512.png" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FANCLUV" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('fancluv_theme') || 'system';
          var dark = t === 'dark' ||
            (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
